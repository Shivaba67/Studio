<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio</title>
    <link rel="stylesheet" href="studios_styling.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <input type="checkbox" id="checkbox">

    <div class="barIcon">
        <label for="checkbox"><i class="fa-solid fa-bars"></i></label>
    </div>

    <div class="Slidebar">
        <h2 class="head1">SHIVBA'S STUDIO</h2>
        <label for="checkbox" class="cross"><i class="fa-solid fa-x"></i></label>
        <hr>
        <nav>
            <ul class="optionList">
                <li class="option"> <a href="#"> <i class="fa-solid fa-calendar-days"> </i> Events</a></li>
                <li class="option"> <a href="#"> <i class="fa-solid fa-image"> </i> Gallery</a></li>
                <li class="option"> <a href="#"> <i class="fa-solid fa-store"> </i> Store</a></li>
                <li class="option"> <a href="#"> <i class="fa-solid fa-business-time"> </i> Booking</a></li>
                <li class="option"> <a href="#"> <i class="fa-solid fa-user"> </i> Accounts</a></li>
                <li class="option"> <a href="#"> <i class="fa-solid fa-phone"> </i> Contact</a></li>
                <li class="option"> <a href="#"> <i class="fa-solid fa-comments"> </i> Feedback</a></li>
            </ul>
        </nav>
        <div class="social_media">
            <ul class="socialOption">
                <li class="socialIcons"><a href="#"> <i class="fa-brands fa-youtube"></i> </a></li>
                <li class="socialIcons"><a href="#"> <i class="fa-brands fa-square-instagram"></i> </a></li>
                <li class="socialIcons"><a href="#"> <i class="fa-brands fa-facebook"></i> </a></li>
                <li class="socialIcons"><a href="#"> <i class="fa-brands fa-linkedin"></i> </a></li>
            </ul>
        </div>

    </div>
</body>

</html>
